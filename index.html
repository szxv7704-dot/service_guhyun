<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 자치행정 협력사업 심사 현황</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --color-bg: #F7F5EF;
    --color-paper: #FFFFFF;
    --color-ink: #1B2A4A;
    --color-ink-soft: #4B5670;
    --color-line: #DEDACB;
    --color-gold: #B08D57;
    --color-gold-soft: #E8DCC4;
    --color-approve: #2F6F4E;
    --color-approve-bg: #E9F1EC;
    --color-reject: #A63D40;
    --color-reject-bg: #F8ECEB;
    --font-display: 'Noto Serif KR', serif;
    --font-body: 'Noto Sans KR', sans-serif;
    --font-mono: 'Roboto Mono', monospace;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  body{
    background: var(--color-bg);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(27,42,74,0.05) 1px, transparent 0);
    background-size: 22px 22px;
    color: var(--color-ink);
    font-family: var(--font-body);
    line-height: 1.6;
    padding-bottom: 80px;
  }

  a{ color: inherit; }

  /* ---------- Header ---------- */
  header.masthead{
    border-bottom: 3px double var(--color-ink);
    padding: 48px 24px 28px;
    max-width: 1180px;
    margin: 0 auto;
    text-align: center;
  }

  .eyebrow{
    font-family: var(--font-mono);
    letter-spacing: 0.35em;
    font-size: 12px;
    color: var(--color-gold);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  h1{
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(28px, 4.4vw, 44px);
    letter-spacing: -0.01em;
  }

  .subtitle{
    margin-top: 10px;
    color: var(--color-ink-soft);
    font-size: 15px;
  }

  .criteria-line{
    margin-top: 18px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--color-ink);
    background: var(--color-paper);
    border: 1px solid var(--color-line);
    padding: 8px 18px;
    border-radius: 999px;
  }
  .criteria-line strong{ color: var(--color-reject); font-weight: 700; }

  /* ---------- Summary strip ---------- */
  .summary{
    max-width: 1180px;
    margin: 32px auto 0;
    padding: 0 24px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  .summary .stat{
    background: var(--color-paper);
    border: 1px solid var(--color-line);
    border-top: 3px solid var(--color-ink);
    padding: 16px 18px;
    text-align: center;
  }
  .summary .stat .num{
    font-family: var(--font-mono);
    font-size: 26px;
    font-weight: 700;
  }
  .summary .stat .label{
    font-size: 12px;
    color: var(--color-ink-soft);
    margin-top: 4px;
  }
  .summary .stat.approve .num{ color: var(--color-approve); }
  .summary .stat.reject .num{ color: var(--color-reject); }

  /* ---------- Card grid ---------- */
  main{
    max-width: 1180px;
    margin: 40px auto 0;
    padding: 0 24px;
  }

  .grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 26px;
  }

  .card{
    position: relative;
    background: var(--color-paper);
    border: 1px solid var(--color-line);
    padding: 26px 24px 22px;
    overflow: hidden;
    transition: transform .18s ease, box-shadow .18s ease;
  }
  .card::before{
    content:"";
    position:absolute; top:0; left:0; right:0; height:4px;
    background: var(--color-ink);
  }
  .card:hover{
    transform: translateY(-3px);
    box-shadow: 0 14px 28px rgba(27,42,74,0.10);
  }

  .card .doc-no{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--color-ink-soft);
    letter-spacing: 0.08em;
  }

  .card h2{
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 700;
    margin-top: 10px;
    padding-right: 78px;
    line-height: 1.4;
  }

  .card .region{
    display: inline-block;
    margin-top: 10px;
    font-size: 13px;
    color: var(--color-gold);
    font-weight: 700;
    border-bottom: 1px solid var(--color-gold-soft);
    padding-bottom: 2px;
  }

  .card .figures{
    margin-top: 18px;
    border-top: 1px dashed var(--color-line);
    padding-top: 14px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .card .figures .figure-label{
    font-size: 12px;
    color: var(--color-ink-soft);
  }
  .card .figures .figure-value{
    font-family: var(--font-mono);
    font-size: 17px;
    font-weight: 700;
  }
  .card.is-reject .figures .figure-value{ color: var(--color-reject); }
  .card.is-approve .figures .figure-value{ color: var(--color-approve); }

  .card .limit-note{
    margin-top: 8px;
    font-size: 11.5px;
    color: var(--color-ink-soft);
    font-family: var(--font-mono);
  }

  /* ---------- Stamp (signature element) ---------- */
  .stamp{
    position: absolute;
    top: 20px;
    right: 20px;
    width: 66px;
    height: 66px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 15px;
    letter-spacing: 0.06em;
    transform: rotate(-11deg);
    opacity: 0.94;
    mix-blend-mode: multiply;
  }
  .stamp::before{
    content:"";
    position:absolute; inset:4px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
  }
  .stamp::after{
    content:"";
    position:absolute; inset:0;
    border-radius: 50%;
    border: 3px solid currentColor;
  }
  .stamp span{ position: relative; z-index: 1; }

  .stamp.approve{ color: var(--color-approve); }
  .stamp.reject{ color: var(--color-reject); }

  /* rough stamped-ink texture using layered shadow */
  .stamp.approve, .stamp.reject{
    filter: drop-shadow(0 0 0.4px currentColor);
  }

  .card.is-approve{ box-shadow: inset 0 0 0 1px transparent; }

  /* ---------- Sheet embed section ---------- */
  section.sheet-section{
    max-width: 1180px;
    margin: 64px auto 0;
    padding: 0 24px;
  }

  .section-heading{
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 16px;
  }
  .section-heading .idx{
    font-family: var(--font-mono);
    color: var(--color-gold);
    font-weight: 700;
    font-size: 13px;
  }
  .section-heading h3{
    font-family: var(--font-display);
    font-size: 21px;
  }
  .section-heading .rule{
    flex: 1;
    border-top: 1px solid var(--color-line);
  }

  .sheet-frame-wrap{
    background: var(--color-paper);
    border: 1px solid var(--color-line);
    border-top: 3px solid var(--color-ink);
    padding: 6px;
  }
  .sheet-frame-wrap iframe{
    width: 100%;
    height: 480px;
    border: none;
    display: block;
  }

  footer{
    max-width: 1180px;
    margin: 60px auto 0;
    padding: 20px 24px 0;
    border-top: 1px solid var(--color-line);
    font-size: 12px;
    color: var(--color-ink-soft);
    text-align: center;
    font-family: var(--font-mono);
  }

  @media (max-width: 640px){
    .summary{ grid-template-columns: repeat(2, 1fr); }
    .card h2{ padding-right: 0; }
    .stamp{ position: static; margin: 10px 0 0; transform: rotate(-6deg); }
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="eyebrow">2026년도 · 지방자치단체 협력사업 신청</div>
  <h1>자치행정 협력사업 심사 현황</h1>
  <p class="subtitle">신청목록.json 기반 자동 집계 · 실시간 판정 결과</p>
  <div class="criteria-line">판정 기준 &nbsp;·&nbsp; 예산 <strong>500,000천원</strong> 초과 시 반려</div>
</header>

<div class="summary" id="summary">
  <div class="stat">
    <div class="num" id="stat-total">–</div>
    <div class="label">전체 신청</div>
  </div>
  <div class="stat approve">
    <div class="num" id="stat-approve">–</div>
    <div class="label">승인</div>
  </div>
  <div class="stat reject">
    <div class="num" id="stat-reject">–</div>
    <div class="label">반려</div>
  </div>
  <div class="stat">
    <div class="num" id="stat-total-budget">–</div>
    <div class="label">신청 총액(천원)</div>
  </div>
</div>

<main>
  <div class="grid" id="card-grid">
    <!-- cards injected by JS -->
  </div>
</main>

<section class="sheet-section">
  <div class="section-heading">
    <span class="idx">03</span>
    <h3>신청 자료 원본 — 구글 시트</h3>
    <span class="rule"></span>
  </div>
  <div class="sheet-frame-wrap">
    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSJCtc7acYK-zQVGJX_lndGT2Wu20NGQbT3fhgLoH3TAYoR56l6DxqBmhwkNGX8UceHpSvB4mBepZV-/pubhtml?gid=0&amp;single=true&amp;widget=true&amp;headers=false" loading="lazy"></iframe>
  </div>
</section>

<footer>
  DATA SOURCE — 신청목록.JSON &nbsp;/&nbsp; AUTO-JUDGE THRESHOLD — 500,000 (천원) &nbsp;/&nbsp; DEPLOYED VIA VERCEL
</footer>

<script>
  const LIMIT = 500000; // 천원, 초과 시 반려

  async function loadApplications(){
    try{
      const res = await fetch('신청목록.json');
      const data = await res.json();
      renderSummary(data);
      renderCards(data);
    }catch(err){
      document.getElementById('card-grid').innerHTML =
        '<p style="font-family: var(--font-mono); color: var(--color-reject);">신청목록.json을 불러오지 못했습니다. 같은 폴더에 파일이 있는지 확인하세요.</p>';
      console.error(err);
    }
  }

  function renderSummary(data){
    const total = data.length;
    const approved = data.filter(d => d.예산 <= LIMIT).length;
    const rejected = total - approved;
    const totalBudget = data.reduce((sum, d) => sum + d.예산, 0);

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-approve').textContent = approved;
    document.getElementById('stat-reject').textContent = rejected;
    document.getElementById('stat-total-budget').textContent = totalBudget.toLocaleString('ko-KR');
  }

  function renderCards(data){
    const grid = document.getElementById('card-grid');
    grid.innerHTML = data.map((d, i) => {
      const isApprove = d.예산 <= LIMIT;
      const docNo = String(i + 1).padStart(3, '0');
      return `
        <article class="card ${isApprove ? 'is-approve' : 'is-reject'}">
          <div class="doc-no">신청번호 &nbsp;NO.${docNo}</div>
          <h2>${d.사업명}</h2>
          <span class="region">${d.지자체명} · 인구 ${d.인구수.toLocaleString('ko-KR')}명</span>

          <div class="figures">
            <div>
              <div class="figure-label">신청 예산(천원)</div>
              <div class="figure-value">${d.예산.toLocaleString('ko-KR')}</div>
            </div>
          </div>
          <div class="limit-note">한도액 500,000 대비 ${isApprove ? '이내' : ((d.예산-LIMIT).toLocaleString('ko-KR') + ' 초과')}</div>

          <div class="stamp ${isApprove ? 'approve' : 'reject'}">
            <span>${isApprove ? '승인' : '반려'}</span>
          </div>
        </article>
      `;
    }).join('');
  }

  loadApplications();
</script>

</body>
</html>
